<div class="group relative overflow-hidden border border-light-border dark:border-dark-border bg-light-800/50 dark:bg-dark-800/50 hover:bg-light-700 dark:hover:bg-dark-700 transition-colors duration-500 gsap-scroll">
    <div class="absolute inset-0 bg-gradient-to-r from-black/5 to-transparent dark:from-white/5 dark:to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-500 pointer-events-none z-10"></div>
    
    <!-- Image Background -->
    <div class="absolute inset-y-0 right-0 w-2/3 lg:w-1/2 opacity-20 dark:opacity-30 mix-blend-luminosity group-hover:mix-blend-normal transition-all duration-700 group-hover:opacity-60 dark:group-hover:opacity-80 group-hover:scale-105 pointer-events-none bg-cover bg-center bg-no-repeat" style="background-image: url('{{project_bg_image}}')">
        <div class="absolute inset-0 bg-gradient-to-r from-light-800 via-light-800/80 dark:from-dark-800 dark:via-dark-800/80 to-transparent z-10"></div>
    </div>
    
    <div class="flex flex-col lg:flex-row items-center justify-between p-8 lg:p-12 relative z-20">
        <div class="w-full lg:w-1/2 mb-8 lg:mb-0">
            <div class="flex items-center gap-4 mb-6">
                <span class="text-[10px] font-mono border border-light-border dark:border-dark-border px-3 py-1 text-gray-500 dark:text-gray-400 transition-colors">{{categoria}}</span>
                <span class="text-[10px] font-mono border border-light-border dark:border-dark-border px-3 py-1 text-gray-500 dark:text-gray-400 transition-colors">{{tecnologias_listado}}</span>
            </div>
            <h3 class="text-3xl font-display font-bold uppercase tracking-tighter mb-4 text-light-accent dark:text-white transition-colors">{{titulo_listado}}</h3>
            <p class="text-light-muted dark:text-dark-muted font-light text-sm max-w-md transition-colors">{{descripcion_listado}}</p>
        </div>
        <div class="w-full lg:w-1/3 flex justify-start lg:justify-end">
            <button data-project-id="{{id}}" class="project-modal-btn w-16 h-16 rounded-full border border-light-border dark:border-dark-border text-light-accent dark:text-white flex items-center justify-center group-hover:bg-light-accent group-hover:border-light-accent group-hover:text-light-900 dark:group-hover:bg-white dark:group-hover:border-white dark:group-hover:text-black transition-all duration-300">
                <i data-lucide="arrow-up-right" class="w-6 h-6"></i>
            </button>
        </div>
    </div>
</div>
