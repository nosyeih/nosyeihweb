<div class="modal-inner-content">
    <div class="flex items-center gap-4 mb-8">
        {{tags_html}}
    </div>
    
    <h2 class="text-4xl md:text-5xl font-display font-bold uppercase tracking-tighter mb-8 text-light-accent dark:text-white">
        {{titulo_modal}}
    </h2>

    <div class="mb-12">
        {{btn_galeria_html}}
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-12 mt-12">
        <div class="lg:col-span-2 space-y-8">
            <div>
                <h3 class="text-sm font-mono tracking-widest uppercase text-light-muted dark:text-dark-muted border-b border-light-border dark:border-dark-border pb-2 mb-4">01 // El Desafío</h3>
                <p class="text-light-accent dark:text-gray-300 font-light leading-relaxed">
                    {{desafio}}
                </p>
            </div>
            
            <div>
                <h3 class="text-sm font-mono tracking-widest uppercase text-light-muted dark:text-dark-muted border-b border-light-border dark:border-dark-border pb-2 mb-4">02 // La Solución Arquitectónica</h3>
                <p class="text-light-accent dark:text-gray-300 font-light leading-relaxed">
                    {{solucion}}
                </p>
            </div>

            <div class="bg-light-800 dark:bg-dark-900/50 p-6 border border-light-border dark:border-dark-border">
                <ul class="space-y-4 font-mono text-sm text-light-accent dark:text-gray-300">
                    {{logros_html}}
                </ul>
            </div>
        </div>

        <div class="space-y-8">
            {{url_html}}

            <div>
                <h3 class="text-sm font-mono tracking-widest uppercase text-light-muted dark:text-dark-muted border-b border-light-border dark:border-dark-border pb-2 mb-4">Stack Tecnológico</h3>
                <div class="flex flex-wrap gap-2">
                    {{stack_html}}
                </div>
            </div>

            <div>
                <h3 class="text-sm font-mono tracking-widest uppercase text-light-muted dark:text-dark-muted border-b border-light-border dark:border-dark-border pb-2 mb-4">Servicios Involucrados</h3>
                <ul class="text-sm text-light-accent dark:text-gray-400 space-y-2 font-light">
                    {{servicios_html}}
                </ul>
            </div>
            
            <a href="#contact" onclick="document.getElementById('modal-close').click();" class="w-full flex justify-center items-center py-4 bg-light-accent dark:bg-white text-light-900 dark:text-black font-mono text-xs uppercase tracking-widest hover:bg-gray-800 dark:hover:bg-gray-200 transition-colors">
                Requerir Sistema Similar
            </a>
        </div>
    </div>
</div>
